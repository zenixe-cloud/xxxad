<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerionX-TEAM | STORE</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <canvas id="particles-bg"></canvas>
    <div class="container">
        <header class="header">
            <img src="logo.png" alt="ZerionX Logo" class="main-logo">
            <h4 class="subtitle">ZERIONX PROJECT</h4>
            <h1 class="title">1 Stealth Project</h1>
        </header>

        <main class="pricing-cards">


            <!-- Card 2 -->
            <article class="card popular">
                <div class="badge">POPULAR</div>
                <div class="card-icon-wrapper">
                    <i class="ph ph-squares-four"></i>
                </div>
                <div class="card-header">
                    <h2 class="card-title">Core-X Panel</h2>
                    <p class="card-subtitle">STEALTH PANEL IMPROVEMENTS</p>
                </div>
                <div class="price-container">
                    <h3 class="price">Rp600.000</h3>
                    <span class="price-usd">$35</span>
                </div>
                <div class="purchase-type">ONE TIME PURCHASE</div>

                <ul class="features">
                    <li><i class="ph ph-trophy"></i> Mid Tier Competitive Support</li>
                    <li><i class="ph ph-ghost"></i> Process & file hiding instant</li>
                    <li><i class="ph ph-stack"></i> Multi-layer stealth protection</li>
                    <li><i class="ph ph-headset"></i> 24/7 Supported Fully</li>
                </ul>

                <button class="buy-btn" onclick="window.location.href='https://discord.gg/34DCGVNksK'">
                    <i class="ph ph-shopping-cart"></i>
                    BUY HERE
                </button>
            </article>


        </main>
    </div>

    <script>
        const canvas = document.getElementById('particles-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > width) this.x = 0;
                else if (this.x < 0) this.x = width;
                
                if (this.y > height) this.y = 0;
                else if (this.y < 0) this.y = height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>

</html>
